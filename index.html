<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cvar Manager & Script Editor (Auto-Save)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="google-ai-bar"></div>

    <div class="container">
        <h2 class="main-title">🛠️ Modding Editor Pro</h2>

        <div class="card">
            <h3>Cvar Manager</h3>
            <textarea id="cvarBox" oninput="saveData('cvarBox')" placeholder="Paste codes here..."></textarea>
            <div class="btn-group">
                <button onclick="copyIt('cvarBox')">COPY ALL</button>
                <button class="btn-clear" onclick="clearIt('cvarBox')">CLEAR ALL</button>
                <button class="btn-dl" onclick="dl('cvarBox', 'mod.nut')">.NUT</button>
                <button class="btn-dl" onclick="dl('cvarBox', 'autoexec.cfg')">.CFG</button>
                <button class="btn-dl" onclick="dl('cvarBox', 'config.txt')">.TXT</button>
            </div>
        </div>

        <div class="card">
            <h3>AddonInfo</h3>
            <textarea id="addonBox" oninput="saveData('addonBox')" placeholder="Addon information..."></textarea>
            <div class="btn-group">
                <button onclick="copyIt('addonBox')">COPY ALL</button>
                <button class="btn-clear" onclick="clearIt('addonBox')">CLEAR ALL</button>
                <button class="btn-dl" onclick="dl('addonBox', 'addoninfo.txt')">DOWNLOAD .TXT</button>
            </div>
        </div>

        <div class="card">
            <h3>Script Editor</h3>
            <textarea id="scriptBox" oninput="saveData('scriptBox')" placeholder="Write scripts here..."></textarea>
            <div class="btn-group">
                <button onclick="copyIt('scriptBox')">COPY ALL</button>
                <button class="btn-clear" onclick="clearIt('scriptBox')">CLEAR ALL</button>
                <button class="btn-dl" onclick="dl('scriptBox', 'script.nut')">.NUT</button>
                <button class="btn-dl" onclick="dl('scriptBox', 'script.cfg')">.CFG</button>
                <button class="btn-dl" onclick="dl('scriptBox', 'script.txt')">.TXT</button>
            </div>
        </div>

        <footer>
            © <span id="y"></span> Modding Tool Center | Auto-Save Enabled
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
